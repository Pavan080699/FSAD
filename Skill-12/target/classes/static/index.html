<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill 12 - Full Stack CRUD</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #eef3f8; color: #1e293b; }
    .container { max-width: 1100px; margin: auto; padding: 24px; }
    .card { background: #fff; padding: 24px; border-radius: 14px; box-shadow: 0 4px 18px rgba(0,0,0,0.08); }
    h1, h2 { color: #0f4c81; }
    .top { text-align: center; margin-bottom: 20px; }
    form { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 24px; }
    input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; }
    button { padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-add { background: #15803d; color: white; }
    .btn-update { background: #d97706; color: white; }
    .btn-cancel { background: #64748b; color: white; }
    .btn-edit { background: #2563eb; color: white; margin-right: 8px; }
    .btn-delete { background: #dc2626; color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
    th { background: #dbeafe; }
    .message { margin-bottom: 16px; padding: 12px; border-radius: 8px; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { margin-bottom: 14px; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; background: #fff; }
      td { border: none; padding: 8px 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useState } = React;

    function App() {
      const [students, setStudents] = useState([]);
      const [form, setForm] = useState({ name: '', email: '', course: '' });
      const [editingId, setEditingId] = useState(null);
      const [message, setMessage] = useState('');
      const [messageType, setMessageType] = useState('success');

      const fetchStudents = async () => {
        try {
          const response = await axios.get('/students');
          setStudents(response.data);
        } catch (error) {
          showMessage('Failed to load students', 'error');
        }
      };

      useEffect(() => {
        fetchStudents();
      }, []);

      const showMessage = (text, type = 'success') => {
        setMessage(text);
        setMessageType(type);
        setTimeout(() => setMessage(''), 2500);
      };

      const handleChange = (e) => {
        setForm({ ...form, [e.target.name]: e.target.value });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          if (editingId) {
            await axios.put(`/students/${editingId}`, form);
            showMessage('Student updated successfully');
          } else {
            await axios.post('/students', form);
            showMessage('Student added successfully');
          }
          setForm({ name: '', email: '', course: '' });
          setEditingId(null);
          fetchStudents();
        } catch (error) {
          showMessage('Operation failed', 'error');
        }
      };

      const handleEdit = (student) => {
        setForm({ name: student.name, email: student.email, course: student.course });
        setEditingId(student.id);
      };

      const handleDelete = async (id) => {
        try {
          await axios.delete(`/students/${id}`);
          showMessage('Student deleted successfully');
          fetchStudents();
        } catch (error) {
          showMessage('Delete failed', 'error');
        }
      };

      const cancelEdit = () => {
        setEditingId(null);
        setForm({ name: '', email: '', course: '' });
      };

      return (
        <div className="container">
          <div className="top">
            <h1>Skill 12 - Student Management CRUD</h1>
            <p>React frontend integrated with Spring Boot backend using REST APIs</p>
          </div>

          <div className="card">
            <h2>{editingId ? 'Update Student' : 'Add Student'}</h2>
            {message && <div className={`message ${messageType}`}>{message}</div>}

            <form onSubmit={handleSubmit}>
              <input type="text" name="name" placeholder="Enter student name" value={form.name} onChange={handleChange} required />
              <input type="email" name="email" placeholder="Enter email" value={form.email} onChange={handleChange} required />
              <input type="text" name="course" placeholder="Enter course" value={form.course} onChange={handleChange} required />
              <button type="submit" className={editingId ? 'btn-update' : 'btn-add'}>
                {editingId ? 'Update Student' : 'Add Student'}
              </button>
              {editingId && <button type="button" className="btn-cancel" onClick={cancelEdit}>Cancel</button>}
            </form>

            <h2>Student List</h2>
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Course</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {students.map((student) => (
                  <tr key={student.id}>
                    <td>{student.id}</td>
                    <td>{student.name}</td>
                    <td>{student.email}</td>
                    <td>{student.course}</td>
                    <td>
                      <button className="btn-edit" onClick={() => handleEdit(student)}>Update</button>
                      <button className="btn-delete" onClick={() => handleDelete(student.id)}>Delete</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
